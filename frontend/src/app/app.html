<main class="app-shell" [class.dark]="theme.dark()">
  <header class="topbar">
    <a class="brand-lockup" routerLink="/" aria-label="Ink home">
      <span class="brand-mark" aria-hidden="true">
        <svg class="brand-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M18 13h20c7.2 0 13 5.8 13 13v25.5c0 1.8-2 2.9-3.5 1.9l-5.1-3.2c-2-1.2-4.2-1.8-6.5-1.8H18c-2.8 0-5-2.2-5-5V18c0-2.8 2.2-5 5-5Z" fill="none" stroke="currentColor" stroke-width="5.5" stroke-linejoin="round"/>
          <path d="M25 26h17M25 35h13" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/>
        </svg>
      </span>
      <div>
        <h1>Ink</h1>
        <p>Private notes, tags, and search.</p>
      </div>
    </a>

    <div class="topbar-actions">
      @if (auth.isAuthenticated()) {
        <a class="nav-link" routerLink="/notes"><svg lucideNotebook class="icon"></svg> Notes</a>
        <span class="status-pill"><svg lucideShieldCheck class="icon"></svg> Protected</span>
      } @else {
        <!-- <a class="nav-link" routerLink="/login">Login</a> -->
        <!-- <a class="nav-link strong" routerLink="/register">Register</a> -->
      }
      <button class="theme-toggle" type="button" [title]="theme.dark() ? 'Switch to light mode' : 'Switch to dark mode'" (click)="theme.toggle()">
        @if (theme.dark()) {
          <svg lucideSun class="icon"></svg>
          <!-- <span>Light</span> -->
        } @else {
          <svg lucideMoon class="icon"></svg>
          <span>Dark</span>
        }
      </button>
    </div>
  </header>

  @if (api.error()) {
    <section class="error-banner" [class.rate-limit]="api.rateLimited()">{{ api.error() }}</section>
  }

  <router-outlet />
</main>
