spring:
  application:
    name: ink
  config:
    import: optional:file:../.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:60}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:30}
  rate-limit:
    auth-capacity: ${RATE_LIMIT_AUTH_CAPACITY:5}
    auth-refill-minutes: ${RATE_LIMIT_AUTH_REFILL_MINUTES:1}
    auth-global-capacity: ${RATE_LIMIT_AUTH_GLOBAL_CAPACITY:120}
    auth-global-refill-minutes: ${RATE_LIMIT_AUTH_GLOBAL_REFILL_MINUTES:1}
    bucket-expiry-minutes: ${RATE_LIMIT_BUCKET_EXPIRY_MINUTES:15}
    max-buckets: ${RATE_LIMIT_MAX_BUCKETS:10000}
    # Render forwards the originating address. Set this to false if the service is
    # ever exposed without a trusted proxy that overwrites X-Forwarded-For.
    trust-forwarded-for: ${RATE_LIMIT_TRUST_FORWARDED_FOR:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.shubham.ink: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","thread":"%thread","message":"%replace(%m){''[\r\n]+'','' ''}"}%n'
